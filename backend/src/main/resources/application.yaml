spring:
  application:
    name: demo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    baselineOnMigrate: true
    enabled: true
    locations: classpath:db/migration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_USER:minio99}
  secret-key: ${MINIO_PASSWORD:minio123}
  default-bucket: ${MINIO_DEFAULT_BUCKET:test}
k8s:
  namespace: ${K8S_NAMESPACE:demo}
  job:
    transform-image:
      image: ${TRANSFORM_IMAGE_DOCKER_IMAGE:ghcr.io/yimwaikei/demo-kubernetes-scripts:demo}
