apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-frontend
  labels:
    app: demo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-frontend
  template:
    metadata:
      labels:
        app: demo-frontend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
        - name: demo-frontend
          image: ghcr.io/yimwaikei/demo-kubernetes-frontend:2378d14921ad9dbec6634b5934964909c7f2f67b
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: VITE_BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: VITE_BACKEND_URL
