apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}-frontend
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-frontend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
        - name: frontend
          image: "{{ .Values.image }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: VITE_BACKEND_URL
              value: "http://{{ .Values.global.host }}"
